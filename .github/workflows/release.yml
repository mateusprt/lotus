name: Build and Release

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Configurar Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25.5'

      - name: Build para Linux
        run: GOOS=linux GOARCH=amd64 go build -o lotus

      - name: Build para Windows
        run: GOOS=windows GOARCH=amd64 go build -o lotus.exe

      - name: Build para macOS
        run: GOOS=darwin GOARCH=amd64 go build -o lotus

      - name: Zipar binários
        run: |
          zip lotus-linux.zip lotus
          zip lotus-windows.zip lotus.exe
          zip lotus-mac.zip lotus

      - name: Criar Release no GitHub
        uses: softprops/action-gh-release@v1
          
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Adiciona os binários zipados como assets
        with:
          tag_name: auto-release-${{ github.sha }}
          files: |
            lotus-linux.zip
            lotus-windows.zip
            lotus-mac.zip